services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mercado-booster-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - meli-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules
    # Garante que o app tente subir antes do ngrok abrir o túnel
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    container_name: mercado-booster-ngrok
    restart: always
    networks:
      - meli-network
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    # O comando aponta para 'app:3000', que é o nome do serviço acima
    command:
      - "http"
      - "app:3000"
    depends_on:
      - app

networks:
  meli-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"